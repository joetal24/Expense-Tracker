<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Finance Manager{% endblock %}</title>
  <style>
    :root {
      --blue-900: #0a1f66;
      --blue-700: #1d4ed8;
      --blue-500: #3b82f6;
      --purple-500: #8b5cf6;
      --white: #ffffff;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-300: #cbd5e1;
      --slate-600: #475569;
      --slate-900: #0f172a;
      --danger: #dc2626;
      --shadow: 0 20px 45px rgba(8, 47, 146, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.45), transparent 30%),
                  radial-gradient(circle at 85% 85%, rgba(139, 92, 246, 0.18), transparent 35%),
                  linear-gradient(145deg, var(--blue-900), var(--blue-700));
      color: var(--slate-100);
      padding: 24px;
    }

    a {
      color: var(--purple-500);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page-center {
      min-height: calc(100vh - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-shell {
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
    }

    .app-layout {
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 18px;
      align-items: start;
    }

    .sidebar {
      padding: 20px;
      position: sticky;
      top: 24px;
    }

    .sidebar-title {
      color: var(--blue-700);
      font-size: 1.15rem;
      margin-bottom: 12px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: block;
      padding: 10px 12px;
      border-radius: 10px;
      color: #1e3a8a;
      font-weight: 700;
      text-decoration: none;
      background: #eff6ff;
      border: 1px solid #dbeafe;
    }

    .nav-item:hover {
      text-decoration: none;
      background: #dbeafe;
    }

    .nav-item.active {
      color: var(--white);
      background: linear-gradient(90deg, var(--blue-700), var(--blue-500));
      border-color: transparent;
    }

    .nav-disabled {
      color: #64748b;
      background: #f1f5f9;
      border: 1px dashed #cbd5e1;
      cursor: default;
    }

    .app-main {
      width: 100%;
    }

    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 18px;
      padding: 30px;
      box-shadow: var(--shadow);
      color: var(--slate-900);
    }

    .auth-card {
      max-width: 440px;
    }

    .title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--blue-700);
    }

    .subtitle {
      color: var(--slate-600);
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .field-group {
      margin-bottom: 16px;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      color: #1e293b;
      font-weight: 600;
      font-size: 0.92rem;
    }

    .field-input {
      width: 100%;
      border: 1px solid var(--slate-300);
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #fff;
      color: var(--slate-900);
    }

    .field-input:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
    }

    .btn-primary {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      background: linear-gradient(90deg, var(--blue-700), var(--blue-500));
      color: var(--white);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .btn-primary:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .helper-text {
      margin-top: 6px;
      color: var(--slate-600);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .error-box {
      margin-bottom: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(220, 38, 38, 0.25);
      background: rgba(220, 38, 38, 0.06);
      color: var(--danger);
      font-size: 0.9rem;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--slate-600);
    }

    @media (max-width: 900px) {
      .app-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  {% if request.user.is_authenticated %}
    <div class="app-layout">
      <aside class="card sidebar">
        <h2 class="sidebar-title">Navigation</h2>
        <nav class="sidebar-nav">
          <a href="{% url 'home' %}" class="nav-item {% if request.path == '/' %}active{% endif %}">Dashboard</a>
          <a href="{% url 'expenses' %}" class="nav-item {% if request.path|slice:':10' == '/expenses/' %}active{% endif %}">Expenses</a>
          <a href="{% url 'loans' %}" class="nav-item {% if request.path|slice:':7' == '/loans/' %}active{% endif %}">Loans</a>
          <a href="{% url 'budgets' %}" class="nav-item {% if request.path|slice:':9' == '/budgets/' %}active{% endif %}">Budgets</a>
          <a href="{% url 'reports' %}" class="nav-item {% if request.path|slice:':9' == '/reports/' %}active{% endif %}">Reports</a>
        </nav>
      </aside>
      <main class="app-main">
  {% else %}
      <main class="{% block main_class %}page-shell{% endblock %}">
  {% endif %}
        {% block content %}{% endblock %}
      </main>
  {% if request.user.is_authenticated %}
    </div>
  {% endif %}
  {% block extra_scripts %}{% endblock %}
</body>
</html>
